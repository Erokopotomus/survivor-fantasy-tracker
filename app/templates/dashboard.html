{% extends "base.html" %}
{% block title %}Dashboard - Survivor Fantasy{% endblock %}
{% block content %}
<div id="page-content">
    <div id="season-status-bar" class="hidden" style="display:none;align-items:center;flex-wrap:wrap;gap:0.75rem 1rem;padding:0.75rem 1rem;margin-bottom:1rem;border-radius:8px;border:1px solid rgba(196,180,158,0.4);background:linear-gradient(135deg, #e8e2d5, #e2dace);">
        <div style="flex:1;min-width:200px;">
            <span class="text-muted" style="font-size:0.85rem;">Season Status:</span>
            <strong id="status-label" style="margin-left:0.4rem;text-transform:uppercase;letter-spacing:0.05em;"></strong>
        </div>
        <div id="status-actions"></div>
        <div style="width:100%;display:flex;align-items:center;flex-wrap:wrap;gap:0.5rem 1.5rem;padding-top:0.5rem;border-top:1px solid rgba(196,180,158,0.4);">
            <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.85rem;">
                <span class="text-muted">Roster Size</span>
                <input id="setting-roster-size" type="number" min="1" max="20" style="width:3.5rem;padding:0.2rem 0.4rem;border-radius:4px;border:1px solid var(--bark-brown);background:var(--bg-input);color:inherit;text-align:center;">
            </label>
            <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.85rem;">
                <span class="text-muted">Max Times Drafted</span>
                <input id="setting-max-drafted" type="number" min="1" max="10" style="width:3.5rem;padding:0.2rem 0.4rem;border-radius:4px;border:1px solid var(--bark-brown);background:var(--bg-input);color:inherit;text-align:center;">
            </label>
            <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.85rem;">
                <span class="text-muted">FA Pickup Limit</span>
                <input id="setting-fa-limit" type="number" min="0" max="50" style="width:3.5rem;padding:0.2rem 0.4rem;border-radius:4px;border:1px solid var(--bark-brown);background:var(--bg-input);color:inherit;text-align:center;">
            </label>
            <button id="save-settings-btn" class="btn btn-sm btn-green" onclick="saveSeasonSettings()">Save</button>
            <span id="settings-feedback" style="font-size:0.8rem;color:var(--green);display:none;">Saved!</span>
        </div>
    </div>
    <div class="dashboard-grid">
        <!-- Left: Leaderboard -->
        <div>
            <div class="flex-between mb-2">
                <h1>Leaderboard</h1>
                <div id="season-info" class="text-muted" style="font-family:'Almendra',serif;font-style:italic;"></div>
            </div>
            <div id="leaderboard-loading" class="loading"><span class="spinner"></span> Loading...</div>
            <div id="leaderboard-table" class="hidden"></div>
        </div>

        <!-- Right: League Chat -->
        <div id="chat-wrapper">
            <h1 class="mb-2">League Chat</h1>
            <div class="card" id="chat-card" style="display:flex;flex-direction:column;">
                <div id="chat-messages" style="flex:1;overflow-y:auto;margin-bottom:0.75rem;padding:0.5rem;display:flex;flex-direction:column;gap:0.4rem;"></div>
                <form id="chat-form" style="display:flex;gap:0.5rem;" onsubmit="sendChat(event)">
                    <input type="text" id="chat-input" placeholder="Say something..." maxlength="500" style="flex:1;">
                    <button type="submit" class="btn btn-sm">Send</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Rosters: full width below -->
    <div id="rosters-content" class="hidden"></div>

    <!-- Latest Episode Recap -->
    <div id="recap-content" class="hidden"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', async () => {
    const auth = requireAuth();
    if (!auth) return;

    try {
        await populateSeasonSelector();
        const seasonId = await getCurrentSeasonId();
        if (!seasonId) {
            document.getElementById('leaderboard-loading').innerHTML = '<p class="text-muted">No seasons found.</p>';
            return;
        }

        const seasons = await getSeasons();
        const season = seasons.find(s => s.id === seasonId);
        document.getElementById('season-info').textContent = season ? season.name : '';

        if (auth.is_commissioner && season) {
            renderStatusBar(season, seasonId);
        }

        const lb = await apiGet(`/api/seasons/${seasonId}/leaderboard`);
        const tableContainer = document.getElementById('leaderboard-table');
        const rostersContainer = document.getElementById('rosters-content');

        if (lb.entries.length === 0) {
            tableContainer.innerHTML = '<p class="text-muted">No scores yet. Draft some castaways and start scoring episodes!</p>';
        } else {
            // Leaderboard table only
            let tableHtml = '<div class="card">';
            tableHtml += '<table><thead><tr><th>Rank</th><th>Player</th><th style="text-align:right;">Total</th></tr></thead><tbody>';
            for (const entry of lb.entries) {
                const pc = getPlayerColor(entry.player_name);
                tableHtml += `<tr>
                    <td style="color:${pc.accent};font-weight:700;font-family:'Cinzel',serif;">#${entry.rank}</td>
                    <td><strong style="color:${pc.accent}">${entry.player_name}</strong>${entry.is_commissioner ? ' <span class="badge badge-commissioner">Commish</span>' : ''}</td>
                    <td style="text-align:right;"><span class="score" style="color:${pc.accent}">${entry.grand_total.toFixed(2)}</span></td>
                </tr>`;
            }
            tableHtml += '</tbody></table></div>';
            tableContainer.innerHTML = tableHtml;

            // Collect active tribes for legend
            const activeTribes = new Set();
            for (const entry of lb.entries) {
                for (const c of entry.roster_breakdown) {
                    if (c.current_tribe) activeTribes.add(c.current_tribe);
                }
            }

            // Roster cards (separate, full width)
            let rosterHtml = '<div class="flex-between" style="align-items:baseline;"><h2 class="mt-2 mb-1">Rosters</h2>';
            rosterHtml += '<div style="display:flex;gap:1rem;font-size:0.75rem;font-family:\'Cinzel\',serif;text-transform:uppercase;letter-spacing:0.08em;">';
            for (const tribe of activeTribes) {
                const tc = getTribeColor(tribe);
                rosterHtml += `<span style="display:flex;align-items:center;gap:0.3rem;"><span style="width:10px;height:10px;border-radius:50%;background:${tc};display:inline-block;"></span>${tribe}</span>`;
            }
            rosterHtml += '</div></div>';
            rosterHtml += '<div class="roster-cards">';
            for (const entry of lb.entries) {
                const pc = getPlayerColor(entry.player_name);
                rosterHtml += `<div class="roster-card" data-player="${entry.player_name}">`;
                rosterHtml += `<div class="roster-card-header">`;
                rosterHtml += `<span class="player-name">${entry.player_name}${entry.is_commissioner ? ' <span class="badge badge-commissioner">Commish</span>' : ''}</span>`;
                rosterHtml += `<span class="player-total">${entry.grand_total.toFixed(2)}</span>`;
                rosterHtml += `</div>`;

                for (const c of entry.roster_breakdown) {
                    const isEliminated = c.status && c.status !== 'active';
                    const tc = c.current_tribe ? getTribeColor(c.current_tribe) : null;
                    const tribeBg = tc && !isEliminated ? `background:${tc}10;` : '';
                    rosterHtml += `<a href="/castaway/${c.castaway_id}" class="roster-castaway${isEliminated ? ' eliminated' : ''}" style="${tribeBg}">`;
                    rosterHtml += renderPhoto(c.photo_url, c.castaway_name, 40);
                    rosterHtml += `<div class="castaway-info">`;
                    rosterHtml += `<div class="name">${c.castaway_name}</div>`;
                    rosterHtml += `<div class="pickup-type">${c.pickup_type}${isEliminated ? ' &middot; voted out' : ''}</div>`;
                    rosterHtml += `</div>`;
                    rosterHtml += `<div class="castaway-score" style="color:${pc.accent}">${c.total_score.toFixed(2)}</div>`;
                    rosterHtml += `</a>`;
                }

                if (entry.prediction_bonus > 0) {
                    rosterHtml += `<div style="text-align:right;padding-top:0.5rem;font-size:0.8rem;color:var(--mud);font-family:'Source Sans Pro',sans-serif;">Prediction bonus: +${entry.prediction_bonus.toFixed(2)}</div>`;
                }
                rosterHtml += `</div>`;
            }
            rosterHtml += '</div>';
            rostersContainer.innerHTML = rosterHtml;
            rostersContainer.classList.remove('hidden');
        }

        document.getElementById('leaderboard-loading').classList.add('hidden');
        tableContainer.classList.remove('hidden');

        // Size chat to match leaderboard column height
        requestAnimationFrame(() => {
            const leftCol = tableContainer.closest('div[style]');
            if (leftCol) {
                const chatCard = document.getElementById('chat-card');
                const chatWrapper = document.getElementById('chat-wrapper');
                const wrapperTop = chatWrapper.querySelector('h1');
                const headerH = wrapperTop ? wrapperTop.offsetHeight + 16 : 0; // h1 + mb-2
                const leftH = leftCol.offsetHeight;
                chatCard.style.height = (leftH - headerH) + 'px';
            }
        });

        // Load chat
        await loadChat(seasonId);
        // Poll chat every 15 seconds
        setInterval(() => loadChat(seasonId), 15000);

        // Load latest episode recap
        await loadLatestRecap(seasonId, lb);
    } catch (err) {
        document.getElementById('leaderboard-loading').innerHTML = `<p class="alert alert-error">${err.message}</p>`;
    }
});

const STATUS_FLOW = {
    setup:    { next: 'drafting',  label: 'Start Draft',      color: '#D4930D' },
    drafting: { next: 'active',    label: 'Start Season',     color: '#10B981' },
    active:   { next: 'complete',  label: 'Complete Season',  color: '#3B82F6' },
    complete: { next: 'active',    label: 'Reopen Season',    color: '#F97316' },
};

const STATUS_COLORS = {
    setup: '#999', drafting: '#D4930D', active: '#10B981', complete: '#3B82F6',
};

let activeSeasonId = null;
let recapEpisodeId = null;
let recapSeasonId = null;
let recapRawText = null;

function renderStatusBar(season, seasonId) {
    activeSeasonId = seasonId;
    const bar = document.getElementById('season-status-bar');
    const label = document.getElementById('status-label');
    const actions = document.getElementById('status-actions');
    const status = season.status;

    label.textContent = status;
    label.style.color = STATUS_COLORS[status] || '#ccc';

    const flow = STATUS_FLOW[status];
    if (flow) {
        actions.innerHTML = `<button class="btn btn-sm btn-outline" style="border-color:${flow.color};color:${flow.color};" onclick="transitionSeason(${seasonId}, '${flow.next}')">${flow.label} &rarr;</button>`;
    } else {
        actions.innerHTML = '';
    }

    document.getElementById('setting-roster-size').value = season.max_roster_size || 4;
    document.getElementById('setting-max-drafted').value = season.max_times_castaway_drafted || 2;
    document.getElementById('setting-fa-limit').value = season.free_agent_pickup_limit ?? 2;

    bar.classList.remove('hidden');
    bar.style.display = 'flex';
}

async function saveSeasonSettings() {
    const body = {
        max_roster_size: parseInt(document.getElementById('setting-roster-size').value),
        max_times_castaway_drafted: parseInt(document.getElementById('setting-max-drafted').value),
        free_agent_pickup_limit: parseInt(document.getElementById('setting-fa-limit').value),
    };
    try {
        await apiPatch(`/api/seasons/${activeSeasonId}`, body);
        const fb = document.getElementById('settings-feedback');
        fb.style.display = 'inline';
        setTimeout(() => fb.style.display = 'none', 2000);
    } catch (err) {
        alert('Failed: ' + err.message);
    }
}

async function transitionSeason(seasonId, newStatus) {
    const flow = Object.values(STATUS_FLOW).find(f => f.next === newStatus);
    const label = flow ? flow.label : `Change to ${newStatus}`;
    if (!confirm(`${label}? This will change the season status to "${newStatus}".`)) return;

    try {
        await apiPatch(`/api/seasons/${seasonId}/status`, { status: newStatus });
        location.reload();
    } catch (err) {
        alert('Failed: ' + err.message);
    }
}

// === Chat ===
async function loadChat(seasonId) {
    const msgs = await apiGet(`/api/seasons/${seasonId}/chat?limit=50`);
    const box = document.getElementById('chat-messages');
    if (!msgs || msgs.length === 0) {
        box.innerHTML = '<span class="text-muted" style="font-size:0.85rem;text-align:center;">No messages yet. Be the first!</span>';
        return;
    }
    box.innerHTML = msgs.map(m => {
        const pc = getPlayerColor(m.player_name);
        const ts = m.created_at ? new Date(m.created_at).toLocaleString([], {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '';
        return `<div style="font-size:0.85rem;line-height:1.4;">
            <strong style="color:${pc.accent}">${m.player_name}</strong>
            <span class="text-muted" style="font-size:0.7rem;margin-left:0.4rem;">${ts}</span>
            <div>${m.message}</div>
        </div>`;
    }).join('');
    box.scrollTop = box.scrollHeight;
}

async function sendChat(e) {
    e.preventDefault();
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg) return;
    const seasonId = await getCurrentSeasonId();
    try {
        await apiPost(`/api/seasons/${seasonId}/chat`, { message: msg });
        input.value = '';
        await loadChat(seasonId);
    } catch (err) {
        alert('Send failed: ' + err.message);
    }
}

// === Recap Formatter (simple Markdown → HTML) ===
function formatRecap(text) {
    // Escape HTML first
    const escaped = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    // Split into paragraphs by double newlines
    const paragraphs = escaped.split(/\n\s*\n/);

    return paragraphs.map(para => {
        // Process each paragraph's lines
        const lines = para.split('\n').map(line => {
            // ## Headers → styled h4
            if (/^##\s+(.+)$/.test(line)) {
                const heading = line.replace(/^##\s+/, '');
                return `<h4 style="font-family:'Cinzel',serif;color:var(--torch-orange);font-size:0.85rem;text-transform:uppercase;letter-spacing:0.1em;margin:0.75rem 0 0.25rem;font-weight:700;">${heading}</h4>`;
            }
            // Lines that are ALL CAPS (at least 3 chars) → treat as header
            if (/^[A-Z][A-Z &\/\-]{2,}$/.test(line.trim())) {
                return `<h4 style="font-family:'Cinzel',serif;color:var(--torch-orange);font-size:0.85rem;text-transform:uppercase;letter-spacing:0.1em;margin:0.75rem 0 0.25rem;font-weight:700;">${line.trim()}</h4>`;
            }
            // **bold** → <strong> with accent color
            let formatted = line.replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--sand);font-family:\'Cinzel\',serif;letter-spacing:0.03em;">$1</strong>');
            // - bullet lines
            if (/^\s*-\s+/.test(formatted)) {
                const content = formatted.replace(/^\s*-\s+/, '');
                return `<div style="padding-left:1rem;position:relative;margin:0.15rem 0;"><span style="position:absolute;left:0;color:var(--torch-orange);">&#x2022;</span>${content}</div>`;
            }
            return formatted;
        });

        // Join lines within a paragraph
        const joined = lines.join('\n');
        // If it's all headers/bullets, don't wrap in <p>
        if (joined.includes('<h4') || joined.includes('padding-left:1rem')) {
            return joined;
        }
        return `<p style="margin:0 0 0.5rem;">${joined}</p>`;
    }).join('<div style="margin:0.6rem 0;"></div>'); // paragraph spacing
}

// === Latest Episode Recap ===
async function loadLatestRecap(seasonId, lb) {
    const recapContainer = document.getElementById('recap-content');

    try {
        // Fetch episodes and find the latest scored one
        const episodes = await apiGet(`/api/seasons/${seasonId}/episodes`);
        const scoredEps = episodes.filter(e => e.is_scored).sort((a, b) => b.episode_number - a.episode_number);
        if (scoredEps.length === 0) return;

        const latestEp = scoredEps[0];
        const recap = await apiGet(`/api/seasons/${seasonId}/weekly-recap/${latestEp.episode_number}`);

        // Build castaway→tribe map from leaderboard roster_breakdown
        const castawayTribeMap = {};
        if (lb && lb.entries) {
            for (const entry of lb.entries) {
                for (const c of entry.roster_breakdown) {
                    if (c.castaway_name && c.current_tribe) {
                        castawayTribeMap[c.castaway_name] = c.current_tribe;
                    }
                }
            }
        }
        // Also fetch all castaways for tribe info on non-drafted castaways
        try {
            const allCastaways = await apiGet(`/api/seasons/${seasonId}/castaways`);
            for (const c of allCastaways) {
                if (c.name && c.current_tribe) castawayTribeMap[c.name] = c.current_tribe;
            }
        } catch (e) { /* non-critical */ }

        // Group castaway scores by tribe
        const tribeGroups = {};
        for (const cs of recap.castaway_scores) {
            const tribe = castawayTribeMap[cs.castaway_name] || 'Unknown';
            if (!tribeGroups[tribe]) tribeGroups[tribe] = [];
            tribeGroups[tribe].push(cs);
        }
        // Sort tribes alphabetically, sort castaways within by score desc
        const sortedTribes = Object.keys(tribeGroups).sort();
        for (const t of sortedTribes) {
            tribeGroups[t].sort((a, b) => b.episode_score - a.episode_score);
        }

        // Build HTML — split layout
        let html = '<h2 class="mt-2 mb-1">Latest Episode</h2>';
        const title = recap.episode_title || `Episode ${recap.episode_number}`;
        html += `<div style="font-family:'Almendra',serif;font-style:italic;color:var(--mud);margin-bottom:1rem;font-size:0.95rem;">Episode ${recap.episode_number}: ${title}</div>`;

        html += '<div class="dashboard-grid" style="gap:1.5rem;align-items:start;">';

        // Store for editing
        recapEpisodeId = latestEp.id;
        recapSeasonId = seasonId;
        recapRawText = recap.episode_description || '';

        // Left: Write-up
        html += '<div class="card">';
        const auth = getAuth();
        const editBtn = auth && auth.is_commissioner
            ? ' <button class="btn btn-sm btn-outline" style="font-size:0.7rem;padding:0.15rem 0.5rem;" onclick="toggleRecapEdit()">Edit</button>'
            : '';
        html += `<h3 class="card-header" style="display:flex;justify-content:space-between;align-items:center;">Recap${editBtn}</h3>`;
        html += '<div id="recap-view">';
        if (recap.episode_description) {
            html += `<div class="recap-body">${formatRecap(recap.episode_description)}</div>`;
        } else {
            html += '<p class="text-muted" style="font-size:0.9rem;">No recap written for this episode.</p>';
        }
        html += '</div>';
        html += `<div id="recap-edit" style="display:none;">
            <textarea id="recap-edit-textarea" style="width:100%;min-height:200px;font-family:'Source Sans Pro',sans-serif;font-size:0.9rem;padding:0.5rem;border-radius:4px;border:1px solid var(--bark-brown);background:var(--bg-input);color:inherit;resize:vertical;"></textarea>
            <div style="display:flex;gap:0.5rem;margin-top:0.5rem;">
                <button class="btn btn-sm btn-green" onclick="saveRecapEdit()">Save</button>
                <button class="btn btn-sm btn-outline" onclick="toggleRecapEdit()">Cancel</button>
            </div>
        </div>`;
        html += '</div>';

        // Right: Score table grouped by tribe
        html += '<div class="card">';
        html += '<h3 class="card-header">Episode Scores</h3>';
        html += '<table><thead><tr><th>Castaway</th><th style="text-align:right;">Score</th><th>Drafted By</th></tr></thead><tbody>';

        for (const tribe of sortedTribes) {
            const tc = getTribeColor(tribe);
            const colSpan = 3;
            html += `<tr><td colspan="${colSpan}" style="background:${tc}18;border-left:3px solid ${tc};padding:0.3rem 0.75rem;font-weight:700;color:${tc};font-size:0.8rem;font-family:'Cinzel',serif;text-transform:uppercase;letter-spacing:0.08em;">${tribe}</td></tr>`;

            for (const cs of tribeGroups[tribe]) {
                const scoreColor = cs.episode_score > 0 ? 'var(--green)' : cs.episode_score < 0 ? 'var(--ember-red)' : 'var(--mud)';
                const draftedBy = cs.drafted_by.length > 0
                    ? cs.drafted_by.map(p => {
                        const pc = getPlayerColor(p);
                        return `<span style="color:${pc.accent};font-weight:600;">${p}</span>`;
                    }).join(', ')
                    : '<span class="text-muted">—</span>';

                html += `<tr style="border-left:3px solid ${tc};">
                    <td style="font-family:'Almendra',serif;font-weight:600;">${cs.castaway_name}</td>
                    <td style="text-align:right;"><span class="score" style="color:${scoreColor};">${cs.episode_score.toFixed(2)}</span></td>
                    <td style="font-size:0.8rem;">${draftedBy}</td>
                </tr>`;
            }
        }

        html += '</tbody></table></div>';
        html += '</div>'; // close grid

        recapContainer.innerHTML = html;
        recapContainer.classList.remove('hidden');
    } catch (e) {
        // Non-critical — just don't show recap section
        console.warn('Could not load episode recap:', e);
    }
}

function toggleRecapEdit() {
    const view = document.getElementById('recap-view');
    const edit = document.getElementById('recap-edit');
    const isEditing = edit.style.display !== 'none';
    if (isEditing) {
        edit.style.display = 'none';
        view.style.display = '';
    } else {
        document.getElementById('recap-edit-textarea').value = recapRawText;
        view.style.display = 'none';
        edit.style.display = '';
    }
}

async function saveRecapEdit() {
    const text = document.getElementById('recap-edit-textarea').value;
    try {
        await apiPatch(`/api/seasons/${recapSeasonId}/episodes/${recapEpisodeId}`, { description: text });
        recapRawText = text;
        const view = document.getElementById('recap-view');
        if (text.trim()) {
            view.innerHTML = `<div class="recap-body">${formatRecap(text)}</div>`;
        } else {
            view.innerHTML = '<p class="text-muted" style="font-size:0.9rem;">No recap written for this episode.</p>';
        }
        document.getElementById('recap-edit').style.display = 'none';
        view.style.display = '';
    } catch (err) {
        alert('Failed to save recap: ' + err.message);
    }
}
</script>
{% endblock %}
