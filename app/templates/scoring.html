{% extends "base.html" %}
{% block title %}Score Episode - Survivor Fantasy{% endblock %}
{% block content %}
<div id="page-content">
    <div class="flex-between mb-2">
        <h1>Score Episode</h1>
    </div>
    <div id="scoring-alert"></div>

    <div class="episode-selector">
        <label style="margin:0;margin-right:0.5rem;">Episode:</label>
        <select id="episode-select"><option value="">Loading...</option></select>
        <button class="btn btn-outline" onclick="loadTemplate()">Load Template</button>
        <button class="btn btn-green" onclick="createNewEpisode()">+ New Episode</button>
        <button class="btn" onclick="deleteEpisode()" id="delete-ep-btn" style="background:#e74c3c;border:none;display:none;">Delete Episode</button>
    </div>

    <div id="episode-flags" class="hidden" style="display:none;gap:1rem;align-items:center;margin-bottom:0.75rem;padding:0.5rem 0.75rem;background:var(--bg-input);border-radius:6px;font-size:0.85rem;">
        <label style="display:flex;align-items:center;gap:0.25rem;margin:0;cursor:pointer;">
            <input type="checkbox" id="flag-merge" style="width:auto" onchange="updateEpisodeFlag('is_merge', this.checked)"> Merge Episode
        </label>
        <label style="display:flex;align-items:center;gap:0.25rem;margin:0;cursor:pointer;">
            <input type="checkbox" id="flag-finale" style="width:auto" onchange="updateEpisodeFlag('is_finale', this.checked)"> Finale
        </label>
        <span id="flag-feedback" style="color:var(--green);display:none;">Saved!</span>
    </div>

    <div id="new-episode-form" class="card hidden">
        <h3 class="card-header">Create New Episode</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
            <div class="form-group">
                <label>Episode Number</label>
                <input type="number" id="new-ep-number" min="1">
            </div>
            <div class="form-group">
                <label>Episode Title</label>
                <input type="text" id="new-ep-title" placeholder="e.g. The Merge Feast">
            </div>
            <div class="form-group">
                <label>Options</label>
                <div style="display:flex;gap:1rem;padding-top:0.25rem">
                    <label style="display:flex;align-items:center;gap:0.25rem;font-size:0.8rem">
                        <input type="checkbox" id="new-ep-merge" style="width:auto"> Merge
                    </label>
                    <label style="display:flex;align-items:center;gap:0.25rem;font-size:0.8rem">
                        <input type="checkbox" id="new-ep-finale" style="width:auto"> Finale
                    </label>
                </div>
            </div>
        </div>
        <div style="display:flex;gap:0.75rem;margin-top:1rem;">
            <button class="btn" onclick="submitNewEpisode()" style="flex:1;padding:0.75rem;font-size:1rem;">Create Episode</button>
        </div>
    </div>

    <div id="quick-score-wizard" class="card hidden">
        <h3 class="card-header">Quick Score</h3>
        <div id="wizard-steps"></div>
        <div style="display:flex;gap:0.75rem;margin-top:1rem;">
            <button class="btn" onclick="submitWizard()" id="wizard-submit-btn">Pre-fill Grid</button>
            <button class="btn btn-outline" onclick="cancelWizard()">Cancel</button>
        </div>
    </div>

    <div id="scoring-loading" class="loading hidden"><span class="spinner"></span> Loading template...</div>
    <div id="scoring-grid-container" class="hidden"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentSeasonId = null;
let currentTemplate = null;
let wizardEpisodeId = null;
let wizardIsMerge = false;

document.addEventListener('DOMContentLoaded', async () => {
    const auth = requireAuth();
    if (!auth || !auth.is_commissioner) {
        document.getElementById('page-content').innerHTML = '<p class="alert alert-error">Commissioner access required.</p>';
        return;
    }

    currentSeasonId = await getCurrentSeasonId();
    if (!currentSeasonId) return;

    await loadEpisodes();
});

async function loadEpisodes() {
    const eps = await apiGet(`/api/seasons/${currentSeasonId}/episodes`);
    const sel = document.getElementById('episode-select');
    sel.innerHTML = '<option value="">Select episode...</option>';
    for (const ep of eps) {
        const scored = ep.is_scored ? ' [SCORED]' : '';
        sel.innerHTML += `<option value="${ep.id}">Ep ${ep.episode_number}: ${ep.title || 'Untitled'}${scored}</option>`;
    }
    toggleDeleteBtn();
}

// Show/hide delete button based on episode selection
document.getElementById('episode-select').addEventListener('change', toggleDeleteBtn);

function toggleDeleteBtn() {
    const btn = document.getElementById('delete-ep-btn');
    btn.style.display = document.getElementById('episode-select').value ? 'inline-block' : 'none';
}

async function deleteEpisode() {
    const sel = document.getElementById('episode-select');
    const epId = sel.value;
    if (!epId) return;
    const epText = sel.options[sel.selectedIndex].text;

    if (!confirm(`Delete "${epText}"? This will remove all scoring data for this episode.`)) return;

    const alertBox = document.getElementById('scoring-alert');
    try {
        const auth = getAuth();
        const resp = await fetch(`/api/seasons/${currentSeasonId}/episodes/${epId}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${auth.access_token}` },
        });
        if (!resp.ok && resp.status !== 204) {
            const err = await resp.json();
            throw new Error(err.detail || 'Delete failed');
        }
        showAlert(alertBox, `${epText} deleted.`, 'success');
        document.getElementById('scoring-grid-container').classList.add('hidden');
        document.getElementById('scoring-grid-container').innerHTML = '';
        await loadEpisodes();
    } catch (err) {
        showAlert(alertBox, `Delete error: ${err.message}`);
    }
}

function createNewEpisode() {
    document.getElementById('new-episode-form').classList.toggle('hidden');
}

async function submitNewEpisode() {
    const alertBox = document.getElementById('scoring-alert');
    try {
        const isMerge = document.getElementById('new-ep-merge').checked;
        const title = document.getElementById('new-ep-title').value.trim() || null;
        const ep = await apiPost(`/api/seasons/${currentSeasonId}/episodes`, {
            episode_number: parseInt(document.getElementById('new-ep-number').value),
            title: title,
            is_merge: isMerge,
            is_finale: document.getElementById('new-ep-finale').checked,
        });
        showAlert(alertBox, `Episode ${ep.episode_number} created!`, 'success');
        document.getElementById('new-episode-form').classList.add('hidden');
        await loadEpisodes();
        document.getElementById('episode-select').value = ep.id;
        await loadTemplate();
        showWizard(ep.id, isMerge, currentTemplate);
    } catch (err) {
        showAlert(alertBox, err.message);
    }
}

// --- Quick Score Wizard ---

function showWizard(episodeId, isMerge, template) {
    wizardEpisodeId = episodeId;
    wizardIsMerge = isMerge;
    const stepsDiv = document.getElementById('wizard-steps');
    const castaways = template.castaways.filter(c => c.status === 'active' || !c.status);
    const tribes = [...new Set(castaways.map(c => c.tribe).filter(Boolean))].sort();

    // Build tribe→castaways map
    const tribeCastaways = {};
    for (const c of castaways) {
        const t = c.tribe || 'Unknown';
        if (!tribeCastaways[t]) tribeCastaways[t] = [];
        tribeCastaways[t].push(c);
    }

    let html = '';

    if (!isMerge) {
        // Pre-merge prompts
        html += buildFormGroup('wizard-tribe-changes', 'Any tribe changes?', 'text', 'No');

        html += buildSelectGroup('wizard-immunity-1st', 'Immunity — 1st Place Tribe', tribes);
        html += buildSelectGroup('wizard-immunity-2nd', 'Immunity — 2nd Place Tribe', ['N/A', ...tribes]);

        const rewardOpts = ['No reward', 'Same as immunity winner', ...tribes];
        html += buildSelectGroup('wizard-reward-tribe', 'Reward Challenge — Winning Tribe', rewardOpts);

        html += `<div class="form-group" style="margin-bottom:0.75rem;">
            <label style="font-size:0.85rem;font-weight:600;">Which tribe went to Tribal Council?</label>
            <select id="wizard-tribal-tribe" onchange="updateVotedOutOptions()" style="width:100%;padding:0.4rem;">
                <option value="">Select...</option>
                ${tribes.map(t => `<option value="${t}">${t}</option>`).join('')}
            </select>
        </div>`;

        html += `<div class="form-group" style="margin-bottom:0.75rem;">
            <label style="font-size:0.85rem;font-weight:600;">Who was voted out?</label>
            <select id="wizard-voted-out" style="width:100%;padding:0.4rem;">
                <option value="">Select tribe first...</option>
            </select>
        </div>`;

    } else {
        // Post-merge prompts
        const castawayNames = castaways.map(c => c.castaway_name).sort();

        html += buildSelectGroup('wizard-individual-immunity', 'Who won Individual Immunity?', castawayNames);
        html += buildSelectGroup('wizard-reward-winner', 'Reward Challenge Winner', ['No reward', ...castawayNames]);

        html += buildSelectGroup('wizard-voted-out', 'Who was voted out?', ['Nobody', ...castawayNames]);
    }

    // Both phases
    html += buildFormGroup('wizard-idols', 'Idols / Advantages found, played, or used?', 'text', 'None');

    stepsDiv.innerHTML = html;

    // Store castaways data on the wizard for later use
    stepsDiv.dataset.castawaysJson = JSON.stringify(castaways);
    stepsDiv.dataset.tribeCastawaysJson = JSON.stringify(tribeCastaways);

    document.getElementById('quick-score-wizard').classList.remove('hidden');
}

function buildFormGroup(id, label, type, placeholder) {
    return `<div class="form-group" style="margin-bottom:0.75rem;">
        <label style="font-size:0.85rem;font-weight:600;">${label}</label>
        <input type="${type}" id="${id}" placeholder="${placeholder || ''}" style="width:100%;padding:0.4rem;">
    </div>`;
}

function buildSelectGroup(id, label, options) {
    const optionsHtml = options.map(o => `<option value="${o}">${o}</option>`).join('');
    return `<div class="form-group" style="margin-bottom:0.75rem;">
        <label style="font-size:0.85rem;font-weight:600;">${label}</label>
        <select id="${id}" style="width:100%;padding:0.4rem;">
            ${optionsHtml}
        </select>
    </div>`;
}

function updateVotedOutOptions() {
    const tribalTribe = document.getElementById('wizard-tribal-tribe').value;
    const votedOutSelect = document.getElementById('wizard-voted-out');
    const tribeCastaways = JSON.parse(document.getElementById('wizard-steps').dataset.tribeCastawaysJson);

    votedOutSelect.innerHTML = '<option value="">Nobody</option>';
    if (tribalTribe && tribeCastaways[tribalTribe]) {
        for (const c of tribeCastaways[tribalTribe].sort((a, b) => a.castaway_name.localeCompare(b.castaway_name))) {
            votedOutSelect.innerHTML += `<option value="${c.castaway_name}">${c.castaway_name}</option>`;
        }
    }
}

function cancelWizard() {
    document.getElementById('quick-score-wizard').classList.add('hidden');
}

function setRule(row, ruleKey, value) {
    const input = row.querySelector(`[data-rule="${ruleKey}"]`);
    if (!input) return;
    if (input.tagName === 'SELECT') {
        input.value = value ? '1' : '0';
    } else {
        input.value = value;
    }
}

function showQuickScoreHighlights(lines) {
    // Remove existing summary card if present
    const existing = document.getElementById('quick-score-summary');
    if (existing) existing.remove();

    const container = document.getElementById('scoring-grid-container');
    const card = document.createElement('div');
    card.id = 'quick-score-summary';
    card.className = 'card';
    card.style.marginTop = '1rem';
    card.style.borderLeft = '3px solid #2ecc71';

    // Convert HTML entities to plain text for textarea
    const plainLines = lines.map(l => l.replace(/&bull; /g, '- ').replace(/&[^;]+;/g, ''));
    const text = plainLines.join('\n');

    // Get current episode title from dropdown
    const epSelect = document.getElementById('episode-select');
    const currentTitle = epSelect.options[epSelect.selectedIndex]?.text.replace(/^Ep \d+: /, '').replace(/ \[SCORED\]$/, '') || '';
    const titleVal = currentTitle === 'Untitled' ? '' : currentTitle;

    let html = '<h3 class="card-header" style="color:#2ecc71;">Episode Summary</h3>';
    html += `<div class="form-group" style="margin-bottom:0.75rem;">
        <label>Title</label>
        <input type="text" id="episode-summary-title" value="${escapeHtml(titleVal)}" placeholder="Episode title..." style="font-size:0.95rem;">
    </div>`;
    html += `<div class="form-group" style="margin-bottom:0.5rem;">
        <label>Notes</label>
        <textarea id="episode-summary-text" rows="8" style="width:100%;resize:vertical;font-size:0.9rem;line-height:1.6;font-family:'Source Sans Pro',sans-serif;padding:0.5rem 0.75rem;">${escapeHtml(text)}</textarea>
        <div style="font-size:0.72rem;color:var(--mud);margin-top:0.25rem;">Formatting: **bold**, ## Header, blank lines for spacing</div>
    </div>`;
    html += `<button class="btn btn-sm btn-green" onclick="saveSummary()" style="margin-top:0.25rem;">Save</button>`;
    html += `<span id="summary-save-feedback" style="font-size:0.8rem;color:var(--green);margin-left:0.5rem;display:none;">Saved!</span>`;
    card.innerHTML = html;
    container.appendChild(card);
}

async function saveSummary() {
    const epId = wizardEpisodeId || document.getElementById('episode-select').value;
    if (!epId) return;
    const text = document.getElementById('episode-summary-text').value;
    const title = document.getElementById('episode-summary-title').value.trim() || null;
    try {
        await apiPatch(`/api/seasons/${currentSeasonId}/episodes/${epId}`, {
            title: title,
            description: text,
        });
        // Refresh episode dropdown to show new title
        await loadEpisodes();
        document.getElementById('episode-select').value = epId;
        const fb = document.getElementById('summary-save-feedback');
        fb.style.display = 'inline';
        setTimeout(() => fb.style.display = 'none', 2000);
    } catch (e) {
        showAlert(document.getElementById('scoring-alert'), 'Failed to save summary: ' + e.message);
    }
}

async function submitWizard() {
    const stepsDiv = document.getElementById('wizard-steps');
    const castaways = JSON.parse(stepsDiv.dataset.castawaysJson);
    const tribeCastaways = JSON.parse(stepsDiv.dataset.tribeCastawaysJson);

    const summaryLines = [];

    if (!wizardIsMerge) {
        // --- Pre-merge logic ---
        const immunity1st = document.getElementById('wizard-immunity-1st').value;
        const immunity2nd = document.getElementById('wizard-immunity-2nd').value;
        const rewardTribe = document.getElementById('wizard-reward-tribe').value;
        const tribalTribe = document.getElementById('wizard-tribal-tribe').value;
        const votedOut = document.getElementById('wizard-voted-out').value;
        const idolsText = document.getElementById('wizard-idols').value.trim() || 'None';

        // Immunity 1st
        if (immunity1st) {
            const members = tribeCastaways[immunity1st] || [];
            for (const c of members) {
                const row = document.querySelector(`tr[data-castaway-id="${c.castaway_id}"]`);
                if (row) setRule(row, 'tribe_immunity_1st', 1);
            }
        }

        // Immunity 2nd
        if (immunity2nd && immunity2nd !== 'N/A') {
            const members = tribeCastaways[immunity2nd] || [];
            for (const c of members) {
                const row = document.querySelector(`tr[data-castaway-id="${c.castaway_id}"]`);
                if (row) setRule(row, 'tribe_immunity_2nd', 1);
            }
        }

        // Reward
        let actualRewardTribe = null;
        if (rewardTribe === 'Same as immunity winner') {
            actualRewardTribe = immunity1st;
        } else if (rewardTribe && rewardTribe !== 'No reward') {
            actualRewardTribe = rewardTribe;
        }
        if (actualRewardTribe) {
            const members = tribeCastaways[actualRewardTribe] || [];
            for (const c of members) {
                const row = document.querySelector(`tr[data-castaway-id="${c.castaway_id}"]`);
                if (row) setRule(row, 'tribe_reward_win', 1);
            }
        }

        // Tribal council
        if (tribalTribe) {
            const tribalMembers = tribeCastaways[tribalTribe] || [];
            for (const c of tribalMembers) {
                const row = document.querySelector(`tr[data-castaway-id="${c.castaway_id}"]`);
                if (!row) continue;
                if (votedOut && c.castaway_name === votedOut) {
                    setRule(row, 'survive_tribal', 0);
                    const statusSelect = row.querySelector('[data-status]');
                    if (statusSelect) statusSelect.value = 'eliminated';
                } else {
                    setRule(row, 'survive_tribal', 1);
                }
            }
        }

        // Summary
        const immLine = immunity2nd && immunity2nd !== 'N/A'
            ? `Immunity: ${immunity1st} (1st), ${immunity2nd} (2nd)`
            : `Immunity: ${immunity1st}`;
        summaryLines.push(`&bull; ${immLine}`);
        summaryLines.push(`&bull; Reward: ${actualRewardTribe || 'No reward'}`);
        summaryLines.push(`&bull; Tribal Council: ${tribalTribe || 'N/A'}`);
        summaryLines.push(`&bull; Voted Out: ${votedOut || 'Nobody'}`);
        summaryLines.push(`&bull; Notes: ${idolsText === 'None' ? 'No idols or advantages played' : escapeHtml(idolsText)}`);

    } else {
        // --- Post-merge logic ---
        const immunityWinner = document.getElementById('wizard-individual-immunity').value;
        const rewardWinner = document.getElementById('wizard-reward-winner').value;
        const votedOut = document.getElementById('wizard-voted-out').value;
        const idolsText = document.getElementById('wizard-idols').value.trim() || 'None';

        // Individual immunity
        if (immunityWinner) {
            const c = castaways.find(x => x.castaway_name === immunityWinner);
            if (c) {
                const row = document.querySelector(`tr[data-castaway-id="${c.castaway_id}"]`);
                if (row) setRule(row, 'individual_immunity_win', 1);
            }
        }

        // Reward
        if (rewardWinner && rewardWinner !== 'No reward') {
            const c = castaways.find(x => x.castaway_name === rewardWinner);
            if (c) {
                const row = document.querySelector(`tr[data-castaway-id="${c.castaway_id}"]`);
                if (row) setRule(row, 'solo_reward_win', 1);
            }
        }

        // Survive tribal — everyone except voted out
        for (const c of castaways) {
            const row = document.querySelector(`tr[data-castaway-id="${c.castaway_id}"]`);
            if (!row) continue;
            if (votedOut && votedOut !== 'Nobody' && c.castaway_name === votedOut) {
                setRule(row, 'survive_tribal', 0);
                const statusSelect = row.querySelector('[data-status]');
                if (statusSelect) statusSelect.value = 'eliminated';
            } else {
                setRule(row, 'survive_tribal', 1);
            }
        }

        // Summary
        summaryLines.push(`&bull; Individual Immunity: ${immunityWinner || 'N/A'}`);
        summaryLines.push(`&bull; Reward: ${rewardWinner && rewardWinner !== 'No reward' ? rewardWinner : 'No reward'}`);
        summaryLines.push(`&bull; Voted Out: ${votedOut && votedOut !== 'Nobody' ? votedOut : 'Nobody'}`);
        summaryLines.push(`&bull; Notes: ${idolsText === 'None' ? 'No idols or advantages played' : escapeHtml(idolsText)}`);
    }

    // Hide wizard
    document.getElementById('quick-score-wizard').classList.add('hidden');

    // Show summary card
    showQuickScoreHighlights(summaryLines);

    // Save initial description to episode (non-critical)
    const summaryTextarea = document.getElementById('episode-summary-text');
    if (summaryTextarea) {
        try {
            await apiPatch(`/api/seasons/${currentSeasonId}/episodes/${wizardEpisodeId}`, {
                description: summaryTextarea.value,
            });
        } catch (e) {
            // Non-critical — ignore
        }
    }

    showAlert(document.getElementById('scoring-alert'), 'Grid pre-filled from wizard answers. Review and submit.', 'success');
}

// --- End Quick Score Wizard ---

async function updateEpisodeFlag(field, value) {
    const epId = document.getElementById('episode-select').value;
    if (!epId) return;
    try {
        await apiPatch(`/api/seasons/${currentSeasonId}/episodes/${epId}`, { [field]: value });
        const fb = document.getElementById('flag-feedback');
        fb.style.display = 'inline';
        setTimeout(() => fb.style.display = 'none', 1500);
    } catch (e) {
        showAlert(document.getElementById('scoring-alert'), `Failed to update: ${e.message}`);
    }
}

async function loadTemplate() {
    const epId = document.getElementById('episode-select').value;
    if (!epId) return;

    const loading = document.getElementById('scoring-loading');
    const container = document.getElementById('scoring-grid-container');
    loading.classList.remove('hidden');
    container.classList.add('hidden');

    try {
        // Fetch episode details to populate flags
        const epDetail = await apiGet(`/api/seasons/${currentSeasonId}/episodes/${epId}`);
        document.getElementById('flag-merge').checked = epDetail.is_merge;
        document.getElementById('flag-finale').checked = epDetail.is_finale;
        document.getElementById('episode-flags').style.display = 'flex';

        currentTemplate = await apiGet(`/api/seasons/${currentSeasonId}/episodes/${epId}/template`);
        renderGrid(currentTemplate);

        // If episode already has scores, load them into the grid
        try {
            const existing = await apiGet(`/api/seasons/${currentSeasonId}/episodes/${epId}/scores`);
            if (existing.events && existing.events.length > 0) {
                for (const ev of existing.events) {
                    const row = document.querySelector(`tr[data-castaway-id="${ev.castaway_id}"]`);
                    if (!row) continue;
                    for (const [ruleKey, value] of Object.entries(ev.event_data)) {
                        const input = row.querySelector(`[data-rule="${ruleKey}"]`);
                        if (!input) continue;
                        if (input.tagName === 'SELECT') {
                            input.value = value ? '1' : '0';
                        } else {
                            input.value = value;
                        }
                    }
                    // Populate status dropdown from current castaway status
                    if (ev.status) {
                        const statusSelect = row.querySelector('[data-status]');
                        if (statusSelect) statusSelect.value = ev.status;
                    }
                }
                showAlert(document.getElementById('scoring-alert'), `Loaded existing scores for ${existing.events.length} castaways. Edit and re-submit as needed.`, 'success');
            }
        } catch (e) {
            // No existing scores — that's fine, blank grid
        }

        loading.classList.add('hidden');
        container.classList.remove('hidden');

        // Always show the Episode Summary card below the grid
        await ensureSummaryCard(epId);
    } catch (err) {
        loading.innerHTML = `<p class="alert alert-error">${err.message}</p>`;
    }
}

async function ensureSummaryCard(epId) {
    // Don't duplicate if wizard already created one
    if (document.getElementById('quick-score-summary')) return;

    // Fetch episode to get existing title/description
    let title = '';
    let description = '';
    try {
        const ep = await apiGet(`/api/seasons/${currentSeasonId}/episodes/${epId}`);
        title = ep.title || '';
        description = ep.description || '';
    } catch (e) {
        // Non-critical
    }

    wizardEpisodeId = wizardEpisodeId || parseInt(epId);

    const container = document.getElementById('scoring-grid-container');
    const card = document.createElement('div');
    card.id = 'quick-score-summary';
    card.className = 'card';
    card.style.marginTop = '1rem';
    card.style.borderLeft = '3px solid #2ecc71';

    let html = '<h3 class="card-header" style="color:#2ecc71;">Episode Summary</h3>';
    html += `<div class="form-group" style="margin-bottom:0.75rem;">
        <label>Title</label>
        <input type="text" id="episode-summary-title" value="${escapeHtml(title)}" placeholder="Episode title..." style="font-size:0.95rem;">
    </div>`;
    html += `<div class="form-group" style="margin-bottom:0.5rem;">
        <label>Notes</label>
        <textarea id="episode-summary-text" rows="8" style="width:100%;resize:vertical;font-size:0.9rem;line-height:1.6;font-family:'Source Sans Pro',sans-serif;padding:0.5rem 0.75rem;">${escapeHtml(description)}</textarea>
        <div style="font-size:0.72rem;color:var(--mud);margin-top:0.25rem;">Formatting: **bold**, ## Header, blank lines for spacing</div>
    </div>`;
    html += `<button class="btn btn-sm btn-green" onclick="saveSummary()" style="margin-top:0.25rem;">Save</button>`;
    html += `<span id="summary-save-feedback" style="font-size:0.8rem;color:var(--green);margin-left:0.5rem;display:none;">Saved!</span>`;
    card.innerHTML = html;
    container.appendChild(card);
}

// Tribe color palette — uses TRIBE_COLORS from app.js (maps tribe name to hex),
// with a fallback palette for unknown tribes
const TRIBE_COLOR_FALLBACKS = ['#e74c3c', '#3498db', '#f1c40f', '#2ecc71', '#e67e22', '#9b59b6', '#1abc9c', '#ec8cb4'];

function getTribeGridColor(tribe, fallbackIndex) {
    const hex = TRIBE_COLORS[tribe] || TRIBE_COLOR_FALLBACKS[fallbackIndex % TRIBE_COLOR_FALLBACKS.length];
    // Convert hex to rgba for background
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return { bg: `rgba(${r},${g},${b},0.15)`, border: hex, text: hex };
}

function renderGrid(template) {
    const container = document.getElementById('scoring-grid-container');
    const rules = template.rules;
    const castaways = template.castaways;

    // Build tribe color map
    const tribes = [...new Set(castaways.map(c => c.tribe).filter(Boolean))].sort();
    const tribeColorMap = {};
    tribes.forEach((tribe, i) => {
        tribeColorMap[tribe] = getTribeGridColor(tribe, i);
    });

    // Tribe legend
    let html = '<div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:0.75rem;">';
    for (const tribe of tribes) {
        const color = tribeColorMap[tribe];
        html += `<div style="display:flex;align-items:center;gap:0.4rem;padding:0.3rem 0.75rem;border-radius:4px;background:${color.bg};border:2px solid ${color.border};">
            <strong style="color:${color.text};font-size:0.85rem;">${tribe}</strong>
        </div>`;
    }
    if (tribes.length === 0) {
        html += '<span style="color:var(--text-muted);font-size:0.85rem;">No tribe data — update castaways\' current_tribe</span>';
    }
    html += '</div>';

    // Sort castaways by tribe then name
    const sorted = [...castaways].sort((a, b) => {
        const ta = a.tribe || 'zzz';
        const tb = b.tribe || 'zzz';
        if (ta !== tb) return ta.localeCompare(tb);
        return a.castaway_name.localeCompare(b.castaway_name);
    });

    html += '<div class="scoring-grid"><table>';

    // Header row
    html += '<thead><tr><th style="position:sticky;left:0;background:var(--bg-input);z-index:25;vertical-align:bottom;padding-bottom:0.5rem;">Castaway</th>';
    for (const rule of rules) {
        const tooltip = `${rule.rule_name} (${rule.points > 0 ? '+' : ''}${rule.points} pts, ${rule.multiplier})`;
        html += `<th class="rule-header" title="${tooltip}">${rule.rule_name}</th>`;
    }
    html += '<th class="rule-header" title="Update castaway status after this episode">Status</th>';
    html += '</tr></thead><tbody>';

    // Castaway rows grouped by tribe
    let lastTribe = null;
    for (const c of sorted) {
        const tribe = c.tribe || 'Unknown';
        const color = tribeColorMap[tribe] || { bg: 'transparent', border: 'var(--border-color)', text: 'var(--text-muted)' };

        // Tribe separator row
        if (tribe !== lastTribe) {
            const colSpan = rules.length + 2;
            html += `<tr><td colspan="${colSpan}" style="background:${color.bg};border-left:3px solid ${color.border};padding:0.3rem 0.75rem;font-weight:700;color:${color.text};font-size:0.8rem;">${tribe}</td></tr>`;
            lastTribe = tribe;
        }

        html += `<tr data-castaway-id="${c.castaway_id}" style="border-left:3px solid ${color.border};">`;
        html += `<td class="castaway-name" style="color:${color.text};font-weight:600;">${c.castaway_name}</td>`;
        for (const rule of rules) {
            const isBinary = rule.multiplier === 'binary';
            const defaultVal = 0;
            if (isBinary) {
                html += `<td><select data-rule="${rule.rule_key}" style="width:60px;padding:0.3rem;text-align:center">
                    <option value="0">-</option><option value="1">Yes</option>
                </select></td>`;
            } else {
                html += `<td><input type="number" data-rule="${rule.rule_key}" value="${defaultVal}" min="0" step="1"></td>`;
            }
        }
        html += `<td><select data-status style="width:90px;padding:0.3rem;text-align:center">
            <option value="active">Active</option>
            <option value="eliminated">Voted Out</option>
            <option value="evacuated">Evacuated</option>
            <option value="quit">Quit</option>
        </select></td>`;
        html += '</tr>';
    }

    html += '</tbody></table></div>';

    // Confessional Upload + Submit buttons
    html += `<div style="display:flex;gap:1rem;margin-top:1rem;flex-wrap:wrap;">
        <button class="btn" onclick="document.getElementById('confessional-file').click()" id="confessional-upload-btn" style="flex:1;padding:0.75rem;font-size:1rem;background:linear-gradient(135deg,#d4930d,#b8860b);border:none;">
            &#128247; Upload Confessionals
        </button>
        <input type="file" id="confessional-file" accept="image/jpeg,image/png,image/webp" style="display:none" onchange="uploadConfessionals(this)">
        <span id="confessional-loading" class="hidden"><span class="spinner"></span> Parsing image...</span>
        <button class="btn" onclick="submitScores()" style="flex:2;padding:0.75rem;font-size:1rem">Submit Scores</button>
    </div>`;

    container.innerHTML = html;
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

async function uploadConfessionals(fileInput) {
    const epId = document.getElementById('episode-select').value;
    if (!epId || !fileInput.files.length) return;

    const alertBox = document.getElementById('scoring-alert');
    const uploadBtn = document.getElementById('confessional-upload-btn');
    const loading = document.getElementById('confessional-loading');

    uploadBtn.disabled = true;
    loading.classList.remove('hidden');

    try {
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        const auth = getAuth();
        const resp = await fetch(`/api/seasons/${currentSeasonId}/episodes/${epId}/parse-confessionals`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${auth.access_token}` },
            body: formData,
        });
        if (!resp.ok) {
            const err = await resp.json();
            throw new Error(err.detail || 'Upload failed');
        }
        const result = await resp.json();

        // Fill confessional_count cells in the grid
        let matched = 0;
        for (const entry of result.confessionals) {
            const row = document.querySelector(`tr[data-castaway-id="${entry.castaway_id}"]`);
            if (!row) continue;
            const input = row.querySelector('[data-rule="confessional_count"]');
            if (!input) continue;
            input.value = entry.count;
            matched++;
        }

        showAlert(alertBox, `Confessional counts filled for ${matched} of ${result.confessionals.length} castaways.`, 'success');
    } catch (err) {
        showAlert(alertBox, `Confessional upload error: ${err.message}`);
    } finally {
        uploadBtn.disabled = false;
        loading.classList.add('hidden');
        fileInput.value = '';  // Reset so same file can be re-uploaded
    }
}

async function submitScores() {
    const epId = document.getElementById('episode-select').value;
    const alertBox = document.getElementById('scoring-alert');
    const rows = document.querySelectorAll('#scoring-grid-container tr[data-castaway-id]');

    const events = [];
    rows.forEach(row => {
        const castawayId = parseInt(row.dataset.castawayId);
        const eventData = {};
        row.querySelectorAll('[data-rule]').forEach(input => {
            const key = input.dataset.rule;
            const val = input.tagName === 'SELECT' ? parseInt(input.value) : parseFloat(input.value) || 0;
            eventData[key] = val;
        });
        const statusSelect = row.querySelector('[data-status]');
        const status = statusSelect ? statusSelect.value : null;
        events.push({ castaway_id: castawayId, event_data: eventData, status });
    });

    try {
        const result = await apiPost(`/api/seasons/${currentSeasonId}/episodes/${epId}/score`, { events });
        let msg = 'Scores submitted! ';
        result.scores.sort((a, b) => b.calculated_score - a.calculated_score);
        const top3 = result.scores.slice(0, 3).map(s => `${s.castaway_name}: ${s.calculated_score.toFixed(2)}`).join(', ');
        msg += `Top scorers: ${top3}`;
        showAlert(alertBox, msg, 'success');
        await loadEpisodes();
    } catch (err) {
        showAlert(alertBox, err.message);
    }
}
</script>
